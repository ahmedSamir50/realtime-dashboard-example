services:
  database:
    image: postgres:latest
    container_name: stock-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  cache:
    image: redis:latest
    container_name: stock-cache
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: StockPriceDashboardExample/src/BE/API/Stock.RealTime.API/Dockerfile
    container_name: stock-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSQL: "Server=database;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__redis: "cache:6379,password=${REDIS_PASSWORD}"
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started

  frontend:
    build:
      context: ./StockPriceDashboardExample/src/FE/ionic/stock_realtime_example
      dockerfile: Dockerfile
    container_name: stock-frontend
    ports:
      - "${UI_PORT}:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

    # Health check for postgres to ensure backend waits correctly
networks:
  default:
    name: stock-network
